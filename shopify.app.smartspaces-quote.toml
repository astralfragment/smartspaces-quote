# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "4d779ee13019d49ad22bdd0647fcb625"
name = "smartspaces-quote"
handle = "smartspaces-quote"
application_url = "https://smartspaces-quote.vercel.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/api/webhooks/app-uninstalled"

[access_scopes]
scopes = "read_customers,read_draft_orders,read_products,write_customers,write_draft_orders,write_files,write_products"

[auth]
redirect_urls = [
  "https://smartspaces-quote.vercel.app/api/auth/callback",
]

[app_proxy]
url = "https://smartspaces-quote.vercel.app/api/proxy"
subpath = "quote"
prefix = "apps"

[pos]
embedded = false
