query CartValidationsGenerateRunInput {
  cart {
    lines {
      merchandise {
        __typename
        ... on ProductVariant {
          product {
            title
            hasTags(tags: ["quote-only"]) {
              tag
              hasTag
            }
            metafield(namespace: "quote", key: "quote_only") {
              value
            }
          }
        }
      }
    }
  }
}
